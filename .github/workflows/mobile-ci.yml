name: Mobile CI

on:
  push:
    branches: [main, dev]
    paths:
      - "Mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Mobile/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
